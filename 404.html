<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — nie znaleziono strony · skaluj.ai</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/sygnet.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Azeret+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#ffffff;--text:#0b0d10;--muted:#565d68;--faint:#8b929c;--line:rgba(0,0,0,.10);--accent:#2f6fe0;--accent-soft:rgba(47,111,224,.10);--sans:"Geist",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--mono:"Azeret Mono",ui-monospace,monospace;--ease:cubic-bezier(.22,1,.36,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;-webkit-font-smoothing:antialiased}
.box{max-width:520px}
.logo{height:26px;width:auto;margin:0 auto 40px;display:block}
.code{font-family:var(--mono);font-size:12px;letter-spacing:.2em;color:var(--accent);text-transform:uppercase;margin-bottom:14px}
h1{font-size:clamp(1.8rem,5vw,2.6rem);font-weight:600;letter-spacing:-.035em;line-height:1.1;margin-bottom:14px}
p{color:var(--muted);font-size:15.5px;line-height:1.6;margin-bottom:30px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 24px;border-radius:9999px;background:var(--text);color:#fff;text-decoration:none;font-size:14.5px;font-weight:500;transition:background .2s,box-shadow .2s}
.btn:hover{background:#000;box-shadow:0 0 0 3px var(--accent-soft)}
.sygnet{position:fixed;right:-40px;bottom:-40px;width:260px;opacity:.05;transform:rotate(-8deg);pointer-events:none}
</style>
</head>
<body>
<div class="box">
  <img class="logo" src="/logo-skaluj.png" alt="skaluj.ai">
  <div class="code">Błąd 404</div>
  <h1>Ta strona nie istnieje — ale Twoje oszczędności tak</h1>
  <p>Link jest nieaktualny albo strona została przeniesiona. Wróć na stronę główną i zobacz, co możemy zautomatyzować w Twojej firmie.</p>
  <a class="btn" href="/">Wróć na stronę główną →</a>
</div>
<img class="sygnet" src="/sygnet.png" alt="" aria-hidden="true">
</body>
</html>
