<!--
  ELEMENT: "zgodność unia" (pasek zgodności UE)
  Stan: ZAPISANY NA PÓŹNIEJ. Usunięty z hero na prośbę usera — wrócimy do niego na późniejszym
  etapie budowy strony i wstawimy w INNEJ sekcji (nie w hero).

  To samo-deklaracje o praktykach firmy (legalne, o ile prawdziwe), linkujące do oficjalnych źródeł UE.
  Aby ponownie użyć: wklej blok CSS do <style>, a blok HTML w wybrane miejsce.
  Klasy: .hero-trust (kontener) + .trust-badge (segmenty). Można zmienić nazwę .hero-trust → .zgodnosc-unia.
-->

<!-- ========== CSS ========== -->
<style>
/* pasek zgodności UE — jeden spójny, oszklony element; pozycje linkują do źródeł UE */
.hero-trust{margin:32px auto 0;width:fit-content;max-width:100%;display:flex;flex-wrap:wrap;justify-content:center;
  border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.6);
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);padding:5px;box-shadow:0 10px 30px rgba(15,30,60,.06);
  opacity:0;animation:fadeUp .9s var(--ease) .64s forwards}
.trust-badge{position:relative;display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:11px;
  font-family:var(--mono);font-size:11px;letter-spacing:.02em;color:var(--muted);
  transition:background-color .3s,color .3s}
.trust-badge:not(:first-child)::before{content:"";position:absolute;left:0;top:24%;bottom:24%;width:1px;
  background:var(--line);transition:opacity .3s}
.trust-badge .tb-ic{width:15px;height:15px;flex:none;color:var(--faint);transition:color .3s,transform .35s var(--ease)}
.trust-badge .ext{width:11px;height:11px;flex:none;color:var(--accent);opacity:0;margin-left:-2px;
  transform:translateX(-4px);transition:opacity .3s,transform .3s}
.trust-badge:hover{background:var(--accent-soft);color:var(--text)}
.trust-badge:hover .tb-ic{color:var(--accent);transform:scale(1.14)}
.trust-badge:hover .ext{opacity:1;transform:none}
.trust-badge:hover::before,.trust-badge:hover + .trust-badge::before{opacity:0}
@media (max-width:680px){
  .hero-trust{border-radius:14px;gap:2px}
  .trust-badge{padding:8px 12px}
  .trust-badge:not(:first-child)::before{display:none}
}
</style>

<!-- ========== HTML ========== -->
<div class="hero-trust" aria-label="Bezpieczeństwo i zgodność — źródła UE">
  <a class="trust-badge" href="https://eur-lex.europa.eu/eli/reg/2016/679/oj" target="_blank" rel="noopener noreferrer" title="RODO / GDPR — oficjalny tekst (EUR-Lex)">
    <svg class="tb-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z"/><path d="M9 12l2 2 4-4"/></svg>
    Zgodność z RODO
    <svg class="ext" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M8 7h9v9"/></svg>
  </a>
  <a class="trust-badge" href="https://digital-strategy.ec.europa.eu/en/policies/regulatory-framework-ai" target="_blank" rel="noopener noreferrer" title="EU AI Act — Komisja Europejska">
    <svg class="tb-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h4"/></svg>
    Zgodni z EU AI Act
    <svg class="ext" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M8 7h9v9"/></svg>
  </a>
  <a class="trust-badge" href="https://commission.europa.eu/law/law-topic/data-protection_en" target="_blank" rel="noopener noreferrer" title="Ochrona danych w UE — Komisja Europejska">
    <svg class="tb-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="7" rx="2"/><rect x="3" y="13" width="18" height="7" rx="2"/><path d="M7 7.5h.01M7 16.5h.01"/></svg>
    Dane przetwarzane w UE
    <svg class="ext" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M8 7h9v9"/></svg>
  </a>
  <a class="trust-badge" href="https://digital-strategy.ec.europa.eu/en/library/ethics-guidelines-trustworthy-ai" target="_blank" rel="noopener noreferrer" title="Wytyczne etyczne dla godnej zaufania AI — Komisja Europejska">
    <svg class="tb-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.5"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/><path d="M16 12l2 2 4-4"/></svg>
    Nadzór człowieka
    <svg class="ext" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M8 7h9v9"/></svg>
  </a>
</div>
